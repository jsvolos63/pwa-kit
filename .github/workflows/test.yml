# Runs the kit's node:test suite on every push and PR. The kit and its tests
# are dependency-free, so there is no install step — consumers (Weather, etc.)
# even run this same test.mjs from node_modules in their own CI.
name: Test

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Syntax-check the shipped module
        run: node --check index.js

      - name: Run tests
        run: node test.mjs
